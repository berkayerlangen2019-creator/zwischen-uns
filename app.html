<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwischen uns</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:system-ui;
overflow:hidden;
touch-action:none;
}

/* ===== LOCK SCREEN ===== */
#lock{
position:fixed;
width:100%;
height:100%;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#lock::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:url('photo1.jpg') center/cover;
filter:blur(25px) brightness(.3);
transform:scale(1.2);
}

.box{
position:relative;
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:20px;
text-align:center;
backdrop-filter: blur(10px);
}

input{
padding:12px;
border:none;
border-radius:10px;
text-align:center;
margin-top:10px;
font-size:16px;
outline:none;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#1db954;
color:black;
font-weight:bold;
cursor:pointer;
}

#err{
color:#ff4d4d;
font-size:12px;
margin-top:10px;
min-height:15px;
}

/* ===== SCENES ===== */
.scene{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
transition:.6s ease;
transform:translateY(100%);
opacity:0;
}

.scene.active{
transform:translateY(0);
opacity:1;
}

/* CARD */
.card{
background:rgba(20,20,20,0.9);
padding:25px;
border-radius:20px;
width:85%;
max-width:420px;
}

/* OPTIONS */
.option{
padding:12px;
margin:10px 0;
background:#222;
border-radius:12px;
cursor:pointer;
transition:.2s;
}

.option.selected{
background:#1db954;
color:black;
transform:scale(1.03);
}

/* PROGRESS */
.top{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:12px;
opacity:.7;
}

.bar{
position:absolute;
top:30px;
left:10%;
width:80%;
height:4px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#1db954;
transition:.4s;
}

/* FINAL */
.final{
font-size:30px;
}

button.big{
padding:14px 26px;
border-radius:30px;
font-size:16px;
}

/* PIXEL CANVAS */
canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
}
</style>
</head>

<body>

<!-- ===== LOCK SCREEN ===== -->
<div id="lock">
  <div class="box">
    <h1>Zwischen uns</h1>
    <p>Enter access code</p>
    <input id="pass" type="password" placeholder="••••••">
    <button onclick="check()">Unlock</button>
    <p id="err"></p>
  </div>
</div>

<!-- TOP UI -->
<div class="top">Zwischen uns: Das Quiz</div>
<div class="bar"><div class="fill" id="fill"></div></div>

<!-- SCENES -->
<div class="scene active" id="s0">
<h1>Ready?</h1>
<p>Swipe or click to continue</p>
</div>

<div class="scene" id="s1">
<div class="card">
<h2>Wer hat zuerst „Ich vermisse dich“ gesagt?</h2>
<div class="option" onclick="select(this)">Berkay</div>
<div class="option" onclick="select(this)">Elisa</div>
</div>
</div>

<div class="scene" id="s2">
<div class="card">
<h2>Wo war unser erster Kuss?</h2>
<div class="option" onclick="select(this)">Hauptbahnhof</div>
<div class="option" onclick="select(this)">Am Rhein</div>
</div>
</div>

<div class="scene" id="s3">
<div class="card">
<h2>Wie viele Stunden zusammen?</h2>
<div class="option" onclick="select(this)">53</div>
<div class="option" onclick="select(this)">74</div>
</div>
</div>

<div class="scene" id="s4">
<h1>Analyzing connection...</h1>
<p id="percent">0%</p>
</div>

<canvas id="c"></canvas>

<div class="scene" id="s5">
<h1 class="final">❤️</h1>
<h1>Will you be my girlfriend?</h1>
<button class="big" onclick="yes()">YES ❤️</button>
</div>

<script>

let scenes=document.querySelectorAll(".scene");
let i=0;

function show(n){
scenes.forEach(s=>s.classList.remove("active"));
if(scenes[n]) scenes[n].classList.add("active");
i=n;
updateBar();
}

function updateBar(){
document.getElementById("fill").style.width=(i/5*100)+"%";
}

function select(el){
el.parentElement.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
}

function next(){
if(i<3){
show(i+1);
}
else if(i===3){
loading();
}
}

function loading(){
show(4);

let p=0;
let interval=setInterval(()=>{
p++;
document.getElementById("percent").innerText=p+"%";

if(p>=99){
clearInterval(interval);
setTimeout(()=>pixel(),500);
}
},25);
}

function pixel(){
let c=document.getElementById("c");
let ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let x=0;

function draw(){
ctx.fillStyle="black";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#1db954";

ctx.fillRect(100+x,300,10,10);
ctx.fillRect(120+x,280,10,10);
ctx.fillRect(140+x,300,10,10);

x+=3;

if(x<600){
requestAnimationFrame(draw);
}else{
setTimeout(()=>show(5),800);
}
}

draw();
}

/* ===== LOCK ===== */
function check(){
let val=document.getElementById("pass").value;
let err=document.getElementById("err");

if(val==="NALA"){
document.getElementById("lock").style.display="none";
show(0);
}else{
err.innerText="Access denied";
}
}

/* CLICK OR SWIPE */
document.addEventListener("click",()=>next());

/* SWIPE */
let startY=0;

document.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
let endY=e.changedTouches[0].clientY;
if(startY-endY>50){
next();
}
});

function yes(){
alert("New chapter unlocked: US ❤️");
}

</script>

</body>
</html>
